<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL W - MONITOR PRO</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --verde: #8cc63f; --rojo: #ff4d4d; --amarillo: #ffd700; --naranja: #ff8c00; }
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        
        .header { padding: 15px; border-bottom: 2px solid var(--verde); display: flex; align-items: center; justify-content: center; background: #111; }
        .logo-small { height: 50px; margin-right: 20px; }

        #contenedor-alertas { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        
        .tarjeta-mesa { 
            background: #000; border-radius: 25px;
            width: 280px; padding: 20px; 
            display: flex; flex-direction: column; justify-content: center;
        }

        /* 4 TIPOS DE ALERTAS Y ANIMACIONES */
        .alerta-normal { border: 6px solid var(--verde); animation: flash-verde 1s infinite alternate; }
        .alerta-premio { border: 6px solid var(--amarillo); animation: flash-amarillo 1.5s infinite alternate; }
        .alerta-escribiendo { border: 6px solid var(--naranja); animation: flash-naranja 0.8s infinite alternate; }
        .alerta-encargado { border: 8px solid var(--rojo); animation: flash-rojo 0.4s infinite alternate; }

        @keyframes flash-verde { from { box-shadow: 0 0 10px var(--verde); } to { box-shadow: 0 0 40px var(--verde); } }
        @keyframes flash-amarillo { from { box-shadow: 0 0 10px var(--amarillo); } to { box-shadow: 0 0 40px var(--amarillo); } }
        @keyframes flash-naranja { from { box-shadow: 0 0 10px var(--naranja); } to { box-shadow: 0 0 50px var(--naranja); } }
        @keyframes flash-rojo { from { box-shadow: 0 0 10px var(--rojo); } to { box-shadow: 0 0 70px var(--rojo); } }

        .num-mesa { font-size: 7.5rem; color: #fff; margin: 0; line-height: 1; }
        .tipo-servicio { font-size: 1.1rem; margin: 10px 0; letter-spacing: -1px; text-transform: uppercase; }
        .tiempo { color: #555; font-size: 0.8rem; font-family: sans-serif; }

        #no-hay { font-size: 2rem; color: #222; margin-top: 150px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="central-blanco.png" class="logo-small">
        <h1>PANEL CENTRAL WINGS</h1>
    </div>

    <div id="no-hay">ESPERANDO ACTIVIDAD...</div>
    <div id="contenedor-alertas"></div>

    <audio id="snd-normal" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio> <audio id="snd-premio" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3"></audio> <audio id="snd-escribiendo" src="https://assets.mixkit.co/active_storage/sfx/1103/1103-preview.mp3"></audio> <audio id="snd-encargado" src="https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3"></audio> <script>
        const ably = new Ably.Realtime('XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo');
        const canal = ably.channels.get('central-alertas');

        canal.subscribe('aviso', (msg) => {
            const mesa = msg.data.mesa;
            const texto = msg.data.texto || "ATENCIÓN NORMAL";
            crearAlerta(mesa, texto);
        });

        function crearAlerta(num, texto) {
            document.getElementById('no-hay').style.display = 'none';
            const idMesa = "mesa-" + num;
            if (document.getElementById(idMesa)) document.getElementById(idMesa).remove();

            const div = document.createElement('div');
            div.id = idMesa;
            
            let claseAlerta = "alerta-normal";
            let sonidoId = "snd-normal";

            // Lógica de Clasificación Central Wings
            if (texto.includes("ENCARGADO")) {
                claseAlerta = "alerta-encargado";
                sonidoId = "snd-encargado";
            } else if (texto.includes("ESCRIBIENDO")) {
                claseAlerta = "alerta-escribiendo";
                sonidoId = "snd-escribiendo";
            } else if (texto.includes("PREMIO")) {
                claseAlerta = "alerta-premio";
                sonidoId = "snd-premio";
            }

            const audio = document.getElementById(sonidoId);
            audio.currentTime = 0;
            audio.play();

            div.className = `tarjeta-mesa ${claseAlerta}`;
            div.innerHTML = `<p class="tipo-servicio">${texto}</p><p class="num-mesa">${num}</p><p class="tiempo">HACE UN MOMENTO</p>`;
            
            document.getElementById('contenedor-alertas').prepend(div);

            setTimeout(() => {
                div.style.transition = "opacity 1s";
                div.style.opacity = "0";
                setTimeout(() => {
                    div.remove();
                    if (document.getElementById('contenedor-alertas').children.length === 0) document.getElementById('no-hay').style.display = 'block';
                }, 1000);
            }, 60000); // Lo dejamos 1 minuto completo para que no se les pase ninguna queja escrita
        }
    </script>
</body>
</html>
