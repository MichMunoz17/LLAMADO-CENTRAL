<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL W - MONITOR FINAL</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --verde: #8cc63f; --rojo: #ff4d4d; --amarillo: #ffd700; --naranja: #ff8c00; }
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        .header { padding: 15px; border-bottom: 2px solid var(--verde); display: flex; align-items: center; justify-content: center; background: #111; }
        .logo-small { height: 50px; margin-right: 20px; }

        #capa-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 999; display: flex; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        #btn-activar {
            background: var(--verde); border: none; color: #000; padding: 30px 60px;
            border-radius: 15px; cursor: pointer; font-family: 'Arial Black', sans-serif; 
            font-size: 1.8rem; box-shadow: 0 0 40px var(--verde);
        }

        #contenedor-alertas { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .tarjeta-mesa { background: #000; border-radius: 25px; width: 280px; padding: 20px; display: flex; flex-direction: column; justify-content: center; }

        .alerta-normal { border: 6px solid var(--verde); animation: flash-verde 1s infinite alternate; }
        .alerta-premio { border: 6px solid var(--amarillo); animation: flash-amarillo 1.5s infinite alternate; }
        .alerta-escribiendo { border: 6px solid var(--naranja); animation: flash-naranja 0.8s infinite alternate; }
        .alerta-encargado { border: 8px solid var(--rojo); animation: flash-rojo 0.4s infinite alternate; }

        @keyframes flash-verde { from { box-shadow: 0 0 10px var(--verde); } to { box-shadow: 0 0 40px var(--verde); } }
        @keyframes flash-amarillo { from { box-shadow: 0 0 10px var(--amarillo); } to { box-shadow: 0 0 40px var(--amarillo); } }
        @keyframes flash-naranja { from { box-shadow: 0 0 10px var(--naranja); } to { box-shadow: 0 0 50px var(--naranja); } }
        @keyframes flash-rojo { from { box-shadow: 0 0 10px var(--rojo); } to { box-shadow: 0 0 70px var(--rojo); } }

        .num-mesa { font-size: 7.5rem; color: #fff; margin: 0; line-height: 1; }
        .tipo-servicio { font-size: 1.1rem; margin: 10px 0; letter-spacing: -1px; text-transform: uppercase; color: #fff; }
        #no-hay { font-size: 2rem; color: #222; margin-top: 150px; }
    </style>
</head>
<body>
    <div id="capa-inicio">
        <img src="central-blanco.png" style="width: 200px; margin-bottom: 30px;">
        <button id="btn-activar" onclick="iniciarTodo()">🚀 ACTIVAR MONITOR</button>
        <p id="status-audio" style="color: #444; margin-top: 20px; font-family: sans-serif;">Haz clic para probar sonido</p>
    </div>

    <div class="header">
        <img src="central-blanco.png" class="logo-small">
        <h1>PANEL CENTRAL WINGS</h1>
    </div>

    <div id="no-hay">ESPERANDO ACTIVIDAD...</div>
    <div id="contenedor-alertas"></div>

    <script>
        const ably = new Ably.Realtime('XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo');
        const canal = ably.channels.get('central-alertas');
        
        let audioCtx = null;

        function iniciarTodo() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                // Beep de prueba inmediato
                beep(440, 0.2, 0.1);
                
                document.getElementById('status-audio').innerText = "¡SONIDO ACTIVADO!";
                document.getElementById('status-audio').style.color = "#8cc63f";
                
                setTimeout(() => {
                    document.getElementById('capa-inicio').style.display = 'none';
                }, 500);
            } catch (e) {
                alert("Error al activar audio: " + e);
            }
        }

        function beep(freq, dur, vol) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = "sine";
            osc.frequency.value = freq;
            gain.gain.value = vol;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function sonar(tipo) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (tipo === "ENCARGADO") {
                beep(880, 0.2, 0.3); setTimeout(() => beep(880, 0.2, 0.3), 300);
            } else if (tipo === "ESCRIBIENDO") {
                beep(660, 0.4, 0.2);
            } else if (tipo === "PREMIO") {
                beep(523, 0.1, 0.2); setTimeout(() => beep(659, 0.15, 0.2), 150);
            } else {
                beep(440, 0.2, 0.2);
            }
        }

        canal.subscribe('aviso', (msg) => {
            const mesa = msg.data.mesa;
            let texto = msg.data.texto || "ATENCIÓN NORMAL";
            texto = texto.replace(/Mesa \d+:/gi, "").trim();
            crearAlerta(mesa, texto);
        });

        function crearAlerta(num, texto) {
            document.getElementById('no-hay').style.display = 'none';
            const idMesa = "mesa-" + num;
            if (document.getElementById(idMesa)) document.getElementById(idMesa).remove();

            let t = "NORMAL"; let c = "alerta-normal";
            if (texto.includes("ENCARGADO")) { c = "alerta-encargado"; t = "ENCARGADO"; }
            else if (texto.includes("ESCRIBIENDO")) { c = "alerta-escribiendo"; t = "ESCRIBIENDO"; }
            else if (texto.includes("PREMIO")) { c = "alerta-premio"; t = "PREMIO"; }

            sonar(t);

            const div = document.createElement('div');
            div.id = idMesa;
            div.className = `tarjeta-mesa ${c}`;
            div.innerHTML = `<p class="tipo-servicio">${texto}</p><p class="num-mesa">${num}</p>`;
            document.getElementById('contenedor-alertas').prepend(div);

            setTimeout(() => {
                div.style.opacity = "0";
                setTimeout(() => { div.remove(); if (document.getElementById('contenedor-alertas').children.length === 0) document.getElementById('no-hay').style.display = 'block'; }, 1000);
            }, 60000); 
        }
    </script>
</body>
</html>
