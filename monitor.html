```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTRAL WINGS - MONITOR TRUE TIME</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --verde: #8cc63f; --rojo: #ff4d4d; --amarillo: #ffd700; --naranja: #ff8c00; --azul: #00bfff; }
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        
        #barra-estado { 
            background: #111; padding: 8px; font-size: 0.75rem; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-around; font-family: sans-serif;
        }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle; }
        .online { background-color: var(--verde); box-shadow: 0 0 10px var(--verde); }
        .offline { background-color: var(--rojo); }

        .header { padding: 15px; border-bottom: 2px solid var(--verde); display: flex; align-items: center; justify-content: center; background: #111; }
        .logo-small { height: 50px; margin-right: 20px; }
        
        #capa-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #btn-activar { background: var(--verde); border: none; color: #000; padding: 30px 60px; border-radius: 15px; cursor: pointer; font-family: 'Arial Black', sans-serif; font-size: 1.8rem; box-shadow: 0 0 40px var(--verde); transition: transform 0.2s; }
        #btn-activar:active { transform: scale(0.95); }
        
        #contenedor-alertas { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .tarjeta-mesa { background: #000; border-radius: 25px; width: 280px; padding: 20px; display: flex; flex-direction: column; justify-content: center; transition: opacity 0.5s; }
        
        .alerta-normal { border: 6px solid var(--verde); animation: flash-verde 1s infinite alternate; }
        .alerta-premio { border: 6px solid var(--amarillo); animation: flash-amarillo 1.5s infinite alternate; }
        .alerta-escribiendo { border: 6px solid var(--naranja); animation: flash-naranja 0.8s infinite alternate; }
        .alerta-encargado { border: 8px solid var(--rojo); animation: flash-rojo 0.4s infinite alternate; }
        
        @keyframes flash-verde { from { box-shadow: 0 0 10px var(--verde); } to { box-shadow: 0 0 40px var(--verde); } }
        @keyframes flash-amarillo { from { box-shadow: 0 0 10px var(--amarillo); } to { box-shadow: 0 0 40px var(--amarillo); } }
        @keyframes flash-naranja { from { box-shadow: 0 0 10px var(--naranja); } to { box-shadow: 0 0 50px var(--naranja); } }
        @keyframes flash-rojo { from { box-shadow: 0 0 10px var(--rojo); } to { box-shadow: 0 0 70px var(--rojo); } }
        
        .num-mesa { font-size: 7.5rem; color: #fff; margin: 0; line-height: 1; }
        .tipo-servicio { font-size: 1.1rem; margin: 10px 0; letter-spacing: -1px; text-transform: uppercase; color: #fff; }
        #no-hay { font-size: 2rem; color: #222; margin-top: 150px; }

        #debug-log { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.9); 
            color: var(--azul); font-family: monospace; font-size: 0.7rem; text-align: left; 
            padding: 8px; max-height: 80px; overflow-y: auto; border-top: 1px solid #333;
        }
        #btn-test { position: fixed; bottom: 90px; right: 10px; background: #222; color: #555; border: 1px solid #333; padding: 8px; font-size: 0.7rem; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="barra-estado">
        <span><span id="dot-ably" class="status-dot offline"></span> NUBE: <span id="txt-ably">CONECTANDO...</span></span>
        <span><span id="dot-puente" class="status-dot offline"></span> SCRIPT LOCAL: <span id="txt-puente">BUSCANDO...</span></span>
    </div>

    <div id="capa-inicio">
        <img src="central-blanco.png" style="width: 200px; margin-bottom: 30px;" onerror="this.src='https://via.placeholder.com/200?text=CENTRAL+WINGS'">
        <button id="btn-activar" onclick="iniciarMonitor()">🔊 ACTIVAR SISTEMA DE MESAS</button>
        <p style="color: #444; margin-top: 20px; font-size: 0.8rem;">Central Wings - Protección de Tiempo Real</p>
    </div>

    <div class="header">
        <img src="central-blanco.png" class="logo-small" onerror="this.style.display='none'">
        <h1>CENTRAL WINGS MONITOR</h1>
    </div>

    <div id="no-hay">ESPERANDO ESCANEOS...</div>
    <div id="contenedor-alertas"></div>
    <div id="debug-log">Iniciando sistema...</div>

    <audio id="snd-normal" src="normal.mp3" preload="auto"></audio> 
    <audio id="snd-premio" src="premio.mp3" preload="auto"></audio> 
    <audio id="snd-escribiendo" src="escribiendo.mp3" preload="auto"></audio> 
    <audio id="snd-encargado" src="urgente.mp3" preload="auto"></audio> 

    <button id="btn-test" onclick="probarSistema()">FORZAR TEST LUZ</button>

    <script>
        const IP_PUENTE = "http://127.0.0.1:8080"; 
        const ably = new Ably.Realtime('XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo');
        const canal = ably.channels.get('central-alertas');
        const historialRecientes = {}; 
        let monitorActivado = false;
        let tiempoDeActivacion = 0; // El "momento cero" del monitor

        function addLog(msg) {
            const logDiv = document.getElementById('debug-log');
            logDiv.innerHTML = "<div>[" + new Date().toLocaleTimeString() + "] " + msg + "</div>" + logDiv.innerHTML;
        }

        ably.connection.on('connected', () => {
            document.getElementById('dot-ably').className = 'status-dot online';
            document.getElementById('txt-ably').innerText = 'CONECTADO';
            addLog("Nube lista.");
        });

        async function verificarPuente() {
            try {
                await fetch(IP_PUENTE + "/check", { mode: 'no-cors' });
                document.getElementById('dot-puente').className = 'status-dot online';
                document.getElementById('txt-puente').innerText = 'SCRIPT ACTIVO';
            } catch(e) {
                document.getElementById('dot-puente').className = 'status-dot offline';
                document.getElementById('txt-puente').innerText = 'SIN SCRIPT';
            }
        }

        function iniciarMonitor() {
            monitorActivado = true;
            // Guardamos el momento exacto en que el staff prendió el monitor
            // Usamos Date.now() pero comparado con el timestamp de Ably
            tiempoDeActivacion = Date.now(); 

            document.querySelectorAll('audio').forEach(a => {
                a.muted = true; a.play().then(() => { a.pause(); a.currentTime = 0; a.muted = false; });
            });
            document.getElementById('capa-inicio').style.display = 'none';
            verificarPuente();
            setInterval(verificarPuente, 5000);
            addLog("Sistema activado. Ignorando alertas previas a: " + new Date(tiempoDeActivacion).toLocaleTimeString());
        }

        async function enviarSenalLuz(estado) {
            if (!monitorActivado) return;
            try {
                await fetch(IP_PUENTE + "/?" + estado, { mode: 'no-cors' });
            } catch (e) { addLog("Error en puente local."); }
        }

        function manejarEfectoLuz(tipo) {
            if (tipo === 'normal' || tipo === 'premio') {
                enviarSenalLuz(1);
                setTimeout(() => { enviarSenalLuz(0); }, 8000);
            } else if (tipo === 'encargado' || tipo === 'escribiendo') {
                let ciclos = 0;
                let intervalo = setInterval(() => {
                    enviarSenalLuz(1);
                    setTimeout(() => { enviarSenalLuz(0); }, 1500);
                    ciclos++;
                    if (ciclos >= 3) clearInterval(intervalo);
                }, 3000);
            }
        }

        // --- RECEPTOR INTELIGENTE (FILTRO POR NACIMIENTO DE MENSAJE) ---
        canal.subscribe((msg) => {
            if (!monitorActivado) return;

            // msg.timestamp es el tiempo real de la NUBE cuando se mandó el mensaje
            // Si el mensaje nació antes de que prendiéramos el monitor, lo ignoramos.
            if (msg.timestamp < (tiempoDeActivacion - 10000)) { // 10s de gracia por lag
                addLog("Mensaje antiguo de la nube detectado y bloqueado.");
                return;
            }

            const datos = msg.data;
            const mesa = datos.mesa || "??";
            const t_stamp = datos.t || "sin-tiempo";
            const idUnico = mesa + "_" + t_stamp;

            // Evitar duplicados del mismo escaneo en la misma sesión
            if (historialRecientes[idUnico]) return;
            historialRecientes[idUnico] = true;
            setTimeout(() => { delete historialRecientes[idUnico]; }, 600000);

            const texto = (datos.texto || "ATENCION").replace(/Mesa \d+:/gi, "").trim();
            crearAlerta(mesa, texto);
        });

        function crearAlerta(num, texto) {
            addLog("Mesa " + num + ": " + texto);
            document.getElementById('no-hay').style.display = 'none';
            const idDiv = "mesa-" + num;
            const vieja = document.getElementById(idDiv);
            if (vieja) vieja.remove();

            let sonidoId = "snd-normal";
            let claseAlerta = "alerta-normal";
            let tipoLuz = "normal";

            if (texto.includes("ENCARGADO")) { 
                claseAlerta = "alerta-encargado"; sonidoId = "snd-encargado"; tipoLuz = "encargado"; 
            } else if (texto.includes("ESCRIBIENDO")) { 
                claseAlerta = "alerta-escribiendo"; sonidoId = "snd-escribiendo"; tipoLuz = "escribiendo"; 
            } else if (texto.includes("PREMIO")) { 
                claseAlerta = "alerta-premio"; sonidoId = "snd-premio"; tipoLuz = "premio"; 
            }

            manejarEfectoLuz(tipoLuz);
            const audio = document.getElementById(sonidoId);
            if(audio) { audio.currentTime = 0; audio.play().catch(e => {}); }

            const div = document.createElement('div');
            div.id = idDiv;
            div.className = "tarjeta-mesa " + claseAlerta;
            div.innerHTML = '<p class="tipo-servicio">' + texto + '</p><p class="num-mesa">' + num + '</p>';
            document.getElementById('contenedor-alertas').prepend(div);

            setTimeout(() => {
                div.style.opacity = "0";
                setTimeout(() => { 
                    if(div.parentNode) div.remove(); 
                    if (document.getElementById('contenedor-alertas').children.length === 0) {
                        document.getElementById('no-hay').style.display = 'block'; 
                    }
                }, 1000);
            }, 60000); 
        }

        function probarSistema() {
            if(!monitorActivado) return;
            crearAlerta("TEST", "PRUEBA CENTRAL");
        }
    </script>
</body>
</html>
