<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CENTRAL W - MONITOR</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --verde: #8cc63f; }
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; margin: 0; overflow: hidden; text-align: center; }
        .header { padding: 20px; border-bottom: 2px solid var(--verde); display: flex; align-items: center; justify-content: center; background: #111; }
        .logo-small { height: 60px; margin-right: 20px; }
        #contenedor-alertas { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; gap: 20px; }
        .tarjeta-mesa { 
            background: #000; border: 5px solid var(--verde); border-radius: 20px;
            width: 250px; padding: 30px; animation: flash 1s infinite alternate;
        }
        .num-mesa { font-size: 8rem; color: var(--verde); margin: 0; }
        .tiempo { color: #555; font-size: 1rem; }
        @keyframes flash { from { box-shadow: 0 0 10px var(--verde); } to { box-shadow: 0 0 40px var(--verde); } }
        #no-hay { font-size: 2rem; color: #333; margin-top: 100px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="central-blanco.png" class="logo-small">
        <h1>ALERTAS COMENSALES</h1>
    </div>

    <div id="no-hay">ESPERANDO ALERTAS DE ATENCIÓN...</div>
    <div id="contenedor-alertas"></div>

    <audio id="pop" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        const ably = new Ably.Realtime('XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo');
        const canal = ably.channels.get('central-alertas');
        const sonido = document.getElementById('pop');

        canal.subscribe('aviso', (msg) => {
            const mesa = msg.data.mesa;
            sonido.play();
            crearAlerta(mesa);
        });

        function crearAlerta(num) {
            document.getElementById('no-hay').style.display = 'none';
            const idMesa = "mesa-" + num;
            if (document.getElementById(idMesa)) return; // No repetir si ya está en pantalla

            const div = document.createElement('div');
            div.id = idMesa;
            div.className = 'tarjeta-mesa';
            div.innerHTML = `<p class="tiempo">ATENCIÓN EN MESA</p><p class="num-mesa">${num}</p><p class="tiempo">HACE UN MOMENTO</p>`;
            document.getElementById('contenedor-alertas').appendChild(div);

            // Auto-limpieza después de 20 segundos (20,000 ms)
            setTimeout(() => {
                div.remove();
                if (document.getElementById('contenedor-alertas').children.length === 0) {
                    document.getElementById('no-hay').style.display = 'block';
                }
            }, 20000); 
        }
    </script>
</body>
</html>
