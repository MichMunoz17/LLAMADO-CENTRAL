<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central W - Experiencia</title>
    <style>
        :root { --v: #8cc63f; --azul: #0088cc; --rojo: #ff4d4d; }
        body { 
            background: #000; color: #fff; font-family: 'Arial Black', sans-serif; 
            text-align: center; margin: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; height: 100vh; padding: 20px;
            position: relative; /* Para mover la mesa a la esquina */
        }

        /* Logo más grande */
        .logo { width: 220px; height: auto; margin-bottom: 25px; }

        .btn-container { width: 100%; max-width: 340px; }

        /* Pregunta más gruesa y blanca */
        .pregunta { 
            font-family: 'Arial Black', sans-serif; 
            font-size: 1.1rem; 
            color: #fff; 
            margin-bottom: 25px; 
            letter-spacing: -0.5px;
        }

        .btn {
            display: block; width: 100%; padding: 22px; margin-bottom: 15px;
            border-radius: 18px; text-decoration: none; transition: transform 0.2s; 
            border: none; cursor: pointer; font-family: 'Arial Black', sans-serif;
        }
        .btn:active { transform: scale(0.95); }

        /* Botón Beneficio: Letras blancas y más gruesas */
        .btn-premio { 
            background: var(--v); 
            box-shadow: 0 8px 20px rgba(140, 198, 63, 0.4); 
            color: #fff; 
            font-size: 1.3rem; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        /* Botón Sugerencia: Más pequeño y discreto */
        .btn-queja { 
            background: #222; 
            font-size: 0.85rem; 
            color: #777; 
            padding: 15px; 
            margin-top: 10px;
        }

        .btn-encargado { background: var(--rojo); color: #fff; font-size: 1.1rem; }
        .btn-escrito { background: var(--azul); color: #fff; font-size: 1.1rem; }

        /* Mesa en la esquina, pequeña y gris tenue */
        .mesa-tag { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            color: #333; 
            font-size: 0.7rem; 
            font-family: sans-serif;
            font-weight: bold;
        }

        #seccion-queja, #loading, #ya-atendido { display: none; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--v); border-radius: 50%; width: 30px; height: 30px; animation: s 1s linear infinite; margin: 10px auto; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer { position: absolute; bottom: 20px; font-family: sans-serif; font-size: 0.7rem; color: #222; }
    </style>
</head>
<body>
    <div class="mesa-tag" id="display-mesa">ID: --</div>

    <img src="central-blanco.png" alt="Central Wings" class="logo">

    <div id="seccion-inicio" class="btn-container">
        <p class="pregunta">¿CÓMO VA TU VISITA HOY?</p>
        <button onclick="enviar('BENEFICIO')" class="btn btn-premio">🎁 ¡QUIERO MI BENEFICIO!</button>
        <button onclick="mostrarQuejas()" class="btn btn-queja">✍️ TENGO UNA SUGERENCIA O QUEJA</button>
    </div>

    <div id="seccion-queja" class="btn-container">
        <p class="pregunta" style="font-size: 1rem;">¿CÓMO PREFIERES RESOLVERLO?</p>
        <button onclick="enviar('ENCARGADO')" class="btn btn-encargado">👨‍💼 HABLAR CON ENCARGADO</button>
        <button onclick="enviar('ESCRITO')" class="btn btn-escrito">📝 PREFIERO ESCRIBIRLO</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#555; cursor:pointer; font-family:sans-serif; margin-top:10px; font-size: 0.8rem;">← Volver</button>
    </div>

    <div id="ya-atendido" class="btn-container">
        <p id="msg-recibido" style="color: var(--v); font-family: 'Arial Black', sans-serif;"></p>
        <p style="color: #fff; font-family: sans-serif;">¡Gracias por tu paciencia! 🍻</p>
    </div>

    <div id="loading">
        <div class="loader"></div>
        <p id="status-text" style="font-family: sans-serif; font-size: 0.8rem; color: var(--v);">PROCESANDO...</p>
    </div>

    <div class="footer">CENTRAL WINGS & SPORTS BAR</div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('m') || "1";
        const formUrl = "https://forms.gle/dyRqmjR3sH6D2cGWA";
        
        // Lo ponemos como un ID pequeño en la esquina
        document.getElementById('display-mesa').innerText = "REF: " + m;

        const estadoPrevio = sessionStorage.getItem("envio_" + m);
        if (estadoPrevio) {
            document.getElementById('seccion-inicio').style.display = 'none';
            document.getElementById('ya-atendido').style.display = 'block';
            document.getElementById('msg-recibido').innerText = "SOLICITUD RECIBIDA";
        }

        function mostrarQuejas() {
            document.getElementById('seccion-inicio').style.display = 'none';
            document.getElementById('seccion-queja').style.display = 'block';
        }

        async function enviar(tipo) {
            document.getElementById('seccion-inicio').style.display = 'none';
            document.getElementById('seccion-queja').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const bot = "8746666236:AAHNWL6-BNiYrw7jlf3-iwX_uK7xlosoAvo";
            const cid = "-5149661099";
            const ablyKey = "XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo";

            let msgTlg = ""; let msgMon = ""; let goForm = false;

            if(tipo === 'BENEFICIO') {
                msgTlg = `🎉 MESA ${m}: ¡Escaneo por un beneficio!`;
                msgMon = `Mesa ${m}: ¡SOLICITARÁ BENEFICIO! 🎁`;
                goForm = true;
            } else if(tipo === 'ENCARGADO') {
                msgTlg = `⚠️ MESA ${m}: ¡SOLICITA AL ENCARGADO!`;
                msgMon = `Mesa ${m}: ¡LLAMAN AL ENCARGADO YA! 👨‍💼`;
                document.getElementById('status-text').innerText = "SOLICITANDO ENCARGADO...";
            } else if(tipo === 'ESCRITO') {
                msgTlg = `📝 MESA ${m}: Escribirá sugerencia o queja en el Form.`;
                msgMon = `Mesa ${m}: ESCRIBIENDO QUEJA O SUG 📝`;
                goForm = true;
            }

            const tlg = fetch(`https://api.telegram.org/bot${bot}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msgTlg)}`);
            const abl = fetch(`https://rest.ably.io/channels/central-alertas/messages`, {
                method: 'POST',
                headers: { 'Authorization': 'Basic ' + btoa(ablyKey), 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'aviso', data: { mesa: m, texto: msgMon } })
            });

            sessionStorage.setItem("envio_" + m, tipo);

            try { await Promise.all([tlg, abl]); } catch(e) {}

            if(goForm) {
                setTimeout(() => { window.location.href = formUrl; }, 800);
            } else {
                document.getElementById('status-text').innerHTML = "¡LISTO!<br>El encargado va a tu mesa enseguida. 🍻";
                document.querySelector('.loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
