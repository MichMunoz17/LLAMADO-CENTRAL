<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central W - Servicio Inteligente</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --verde: #8cc63f; }
        body { background-color: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .logo-img { width: 200px; margin: 0 auto 20px; display: block; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--verde); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #success { display:none; }
        .m-num { font-size: 2.5rem; color: var(--verde); font-weight: 900; }
    </style>
</head>
<body>
    <img src="central-blanco.png" class="logo-img">
    
    <div id="loading">
        <div class="loader"></div>
        <p>Llamando a CW...</p>
    </div>

    <div id="success">
        <h2 id="titulo">¡RECIBIDO!</h2>
        <p id="m-info" class="m-num"></p>
        <p id="cuerpo">Tu representante va en camino. 🍻</p>
        <p style="font-size: 0.8rem; color: #444; margin-top: 20px; border-top: 1px solid #222; padding-top: 10px;">
            ¿Algo más? <strong>Vuelve a escanear.</strong>
        </p>
    </div>

    <script>
        // Capturamos la mesa rápido
        const params = new URLSearchParams(window.location.search);
        const m = params.get('m') || "1";
        
        // Datos de conexión
        const token = "8746666236:AAHNWL6-BNiYrw7jlf3-iwX_uK7xlosoAvo";
        const cid = "-5149661099";

        // Función para mostrar la pantalla de éxito
        function listo(esRef) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            document.getElementById('m-info').innerText = "Mesa " + m;
            if(esRef) {
                document.getElementById('titulo').innerText = "ACTIVA";
                document.getElementById('cuerpo').innerText = "Solicitud ya enviada. ¡Ten paciencia!";
            }
        }

        // --- LÓGICA DE ENVÍO ---
        if (!sessionStorage.getItem("a_" + m)) {
            // 1. Mandar a Telegram (Súper rápido)
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${cid}&text=${encodeURIComponent('🚨 MESA ' + m + ' - SOLICITA ATENCIÓN 🍗')}`)
            .finally(() => {
                // 2. Mandar a Ably (Monitor)
                try {
                    const ably = new Ably.Realtime('XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo');
                    const chan = ably.channels.get('central-alertas');
                    chan.publish('aviso', { mesa: m });
                } catch(e) { console.log("Ably error"); }
                
                sessionStorage.setItem("a_" + m, "true");
                listo(false);
            });
        } else {
            listo(true);
        }
    </script>
</body>
</html>
