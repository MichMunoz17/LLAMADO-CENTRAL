<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central W - Servicio</title>
    <style>
        :root { --v: #8cc63f; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            height: 100vh; 
            padding-top: 30px; 
            overflow: hidden; 
        }

        /* Logo centrado y más grande */
        .logo { 
            width: 85%; 
            max-width: 360px; 
            height: auto; 
            margin-bottom: 15px; 
        }

        .loader { border: 4px solid #222; border-top: 4px solid var(--v); border-radius: 50%; width: 45px; height: 45px; animation: s 1s linear infinite; margin: 20px auto; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #ok { display: none; width: 90%; animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .check { font-size: 6rem; color: var(--v); margin-bottom: 5px; line-height: 1; }
        .m { font-size: 3rem; color: var(--v); font-weight: 900; margin: 5px 0; letter-spacing: -1px; }
        
        .footer { 
            color: #444; 
            font-size: 0.85rem; 
            margin-top: 30px; 
            padding-top: 20px; 
            border-top: 1px solid #222; 
            width: 85%; 
            font-family: sans-serif; 
        }
        strong { color: var(--v); }
    </style>
</head>
<body>
    <img src="central-blanco.png" class="logo">
    
    <div id="load">
        <div class="loader"></div>
        <p style="font-family: sans-serif; color: #888; font-weight: bold; margin-top: 15px;">CONECTANDO CON LÍDERES...</p>
    </div>

    <div id="ok">
        <div class="check">✓</div>
        <h2 id="t" style="margin:0; font-size: 1.8rem;">¡RECIBIDO!</h2>
        <p id="info" class="m"></p>
        <p id="c" style="color:#bbb; font-family: sans-serif; font-weight: bold; font-size: 1.1rem;">Representante en camino. 🍻</p>
        
        <div class="footer">
            ¿Algo más?<br>
            <strong>Vuelve a escanear el sensor de tu mesa.</strong>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('m') || "1";
        
        const mostrar = (esRef) => { 
            document.getElementById('load').style.display='none'; 
            document.getElementById('ok').style.display='block';
            document.getElementById('info').innerText = "MESA " + m;
            if(esRef) {
                document.getElementById('t').innerText = "SOLICITUD ACTIVA";
                document.getElementById('c').innerText = "¡Ya avisamos! Danos un momento. 🍻";
                document.querySelector('.check').style.color = "#333";
            }
        };

        if (!sessionStorage.getItem("a_" + m)) {
            const bot = "8746666236:AAHNWL6-BNiYrw7jlf3-iwX_uK7xlosoAvo";
            const cid = "-5149661099";
            const ablyKey = "XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo";

            // MÉTODO REST: El iPhone dispara la alerta y no se queda esperando
            const tlg = fetch(`https://api.telegram.org/bot${bot}/sendMessage?chat_id=${cid}&text=${encodeURIComponent('🚨 MESA ' + m + ' - NECESITA ATENCIÓN 🍗')}`);
            
            const abl = fetch(`https://rest.ably.io/channels/central-alertas/messages`, {
                method: 'POST',
                headers: { 'Authorization': 'Basic ' + btoa(ablyKey), 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'aviso', data: { mesa: m } })
            });

            // En cuanto Telegram o Ably respondan (lo que sea más rápido), soltamos la palomita
            Promise.any([tlg, abl]).finally(() => {
                sessionStorage.setItem("a_" + m, "true");
                setTimeout(() => mostrar(false), 200); 
            });
            
            // Seguro de vida de 1.2 segundos por si el internet de plano está muerto
            setTimeout(() => { if(document.getElementById('ok').style.display !== 'block') mostrar(false); }, 1200);
        } else {
            mostrar(true);
        }
    </script>
</body>
</html>
