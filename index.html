<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Central W - Servicio</title>
    <style>
        :root { --v: #8cc63f; --gris-bloqueo: #1a1a1a; }
        body { 
            background: #000; color: #fff; font-family: 'Arial Black', sans-serif; 
            text-align: center; margin: 0; display: flex; flex-direction: column; 
            align-items: center; min-height: 100vh; min-height: -webkit-fill-available;
            overflow-x: hidden; position: relative;
        }
        .logo { width: 220px; height: auto; margin-top: 40px; margin-bottom: 20px; }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; max-width: 340px; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--v); border-radius: 50%; width: 40px; height: 40px; animation: s 1s linear infinite; margin: 20px auto; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #ok { display: none; width: 100%; animation: entrada 0.5s ease-out; }
        @keyframes entrada { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .check { font-size: 5rem; color: var(--v); margin-bottom: 10px; }
        body.bloqueado { background: var(--gris-bloqueo); }
        .footer { margin: 25px auto; padding-top: 15px; border-top: 1px solid #222; width: 85%; font-family: sans-serif; }
        .seguridad-info { width: 90%; margin-bottom: 40px; font-family: sans-serif; font-size: 0.6rem; color: rgba(255, 255, 255, 0.2); line-height: 1.4; text-transform: uppercase; }
        strong { color: var(--v); }
    </style>
</head>
<body>
    <img src="central-blanco.png" alt="Central Wings" class="logo">
    <div id="main-content">
        <div id="load"><div class="loader"></div><p>SOLICITANDO ATENCIÓN...</p></div>
        <div id="ok">
            <div class="check" id="icono-check">✓</div>
            <h2 id="t" style="margin:0; font-size: 2.2rem;">¡RECIBIDO!</h2>
            <p id="c" style="font-family: sans-serif; font-weight: bold; margin-top: 10px;">Representante en camino. 🍻</p>
        </div>
    </div>
    <div class="seguridad-info">CENTRAL WINGS - BY JAVIER MUÑOZ</div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('m') || "1";
        const t_nfc = p.get('t') || ""; 

        const mostrar = (esBloqueo) => {
            document.getElementById('load').style.display = 'none';
            document.getElementById('ok').style.display = 'block';
            if(esBloqueo) {
                document.body.classList.add('bloqueado');
                document.getElementById('t').innerText = "SOLICITUD ACTIVA";
                document.getElementById('c').innerText = "¡Ya te vimos! Ten paciencia. 🍻";
                document.getElementById('icono-check').innerText = "⌛";
            }
        };

        const ahora = Date.now();
        const ultimaAlerta = localStorage.getItem("u_alt_" + m);
        const esRecarga = sessionStorage.getItem("a_" + m);

        if (esRecarga || (ultimaAlerta && (ahora - ultimaAlerta < 240000))) {
            mostrar(true);
        } else {
            // --- ESTRATEGIA DE ENVÍO BLINDADO ---
            const bot = "8746666236:AAHNWL6-BNiYrw7jlf3-iwX_uK7xlosoAvo";
            const cid = "-5149661099";
            const ablyKey = "XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo";
            const msgTlg = `🚨 MESA ${m} - NECESITA ATENCIÓN 🍗`;

            // 1. Marcar como enviado inmediatamente para evitar bucles
            sessionStorage.setItem("a_" + m, "true");
            localStorage.setItem("u_alt_" + m, ahora);

            // 2. Usar fetch con 'keepalive: true' (ESTO ES CLAVE PARA IPHONE)
            // Permite que la petición siga viva aunque el usuario cierre el navegador
            const p1 = fetch(`https://api.telegram.org/bot${bot}/sendMessage?chat_id=${cid}&text=${encodeURIComponent(msgTlg)}`, { keepalive: true });
            
            const p2 = fetch(`https://rest.ably.io/channels/central-alertas/messages`, {
                method: 'POST',
                headers: { 'Authorization': 'Basic ' + btoa(ablyKey), 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'aviso', data: { mesa: m, t: t_nfc } }),
                keepalive: true
            });

            // 3. Solo mostrar la confirmación cuando estemos 90% seguros de que el iPhone soltó el paquete de datos
            Promise.all([p1, p2])
                .then(() => mostrar(false))
                .catch(() => mostrar(false)); // Mostramos igual por si fue error de red pero ya se intentó

            // 4. Timeout de seguridad: Si en 2.5 segundos no hay respuesta, forzamos la vista
            setTimeout(() => { if(document.getElementById('ok').style.display !== 'block') mostrar(false); }, 2500);
        }
    </script>
</body>
</html>
