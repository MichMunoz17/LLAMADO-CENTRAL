<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central W - Servicio Inteligente</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root { --verde: #8cc63f; }
        body { background-color: #000; color: #fff; font-family: 'Arial Black', sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* El Logo que me pasaste */
        .logo-img { width: 220px; height: auto; margin: 0 auto 20px; display: block; }
        
        /* Animación de carga */
        .loader { border: 4px solid #222; border-top: 4px solid var(--verde); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Pantalla de Éxito */
        .success-icon { font-size: 5rem; color: var(--verde); margin-bottom: 10px; }
        .m-num { font-size: 2.8rem; color: var(--verde); font-weight: 900; margin: 5px 0; letter-spacing: -2px; }
        
        /* Instrucciones al pie */
        .info-re-scan { color: #555; font-size: 0.85rem; margin-top: 30px; padding-top: 20px; border-top: 1px solid #222; width: 80%; margin-left: 10%; }
        strong { color: var(--verde); }

        #success { display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <img src="central-blanco.png" alt="Central Wings" class="logo-img">
    
    <div id="loading">
        <div class="loader"></div>
        <p style="color: #888; font-weight: bold;">SOLICITANDO REPRESENTANTE...</p>
    </div>

    <div id="success">
        <div class="success-icon">✓</div>
        <h2 id="msg-t" style="margin:0; letter-spacing: -1px;">¡RECIBIDO!</h2>
        <p id="m-info" class="m-num"></p>
        <p id="msg-c" style="color: #bbb; font-weight: bold;">Un representante va en camino. 🍻</p>
        
        <div class="info-re-scan">
            ¿Algo más?<br>
            <strong>Vuelve a escanear el sensor de tu mesa.</strong>
        </div>
    </div>

    <script>
        const m = new URLSearchParams(window.location.search).get('m') || "1";
        const token = "8746666236:AAHNWL6-BNiYrw7jlf3-iwX_uK7xlosoAvo";
        const chatId = "-5149661099";
        const ablyKey = 'XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo';

        function mostrarExito(esRef) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            document.getElementById('m-info').innerText = "MESA " + m;
            if(esRef) {
                document.getElementById('msg-t').innerText = "SOLICITUD ACTIVA";
                document.getElementById('msg-c').innerText = "Ya avisamos a tu representante. ¡Salud! 🍻";
                document.querySelector('.success-icon').style.color = "#444";
            }
        }

        if (!sessionStorage.getItem("a_" + m)) {
            // Mandamos señales de volada
            const ably = new Ably.Realtime({ key: ablyKey, closeOnUnload: false });
            const channel = ably.channels.get('central-alertas');

            // Disparo gemelo: Telegram y Monitor al mismo tiempo
            Promise.all([
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('🚨 MESA ' + m + ' SOLICITA ATENCIÓN 🍗')}`),
                channel.publish('aviso', { mesa: m })
            ]).finally(() => {
                sessionStorage.setItem("a_" + m, "true");
                mostrarExito(false);
            });

            // Seguro de vida para iPhones lentos (3 segundos máximo de carga)
            setTimeout(() => { if(document.getElementById('success').style.display !== 'block') mostrarExito(false); }, 3000);
        } else {
            mostrarExito(true);
        }
    </script>
</body>
</html>
