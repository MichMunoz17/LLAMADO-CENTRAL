<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central W - Servicio</title>
    <style>
        :root { --v: #8cc63f; --gris: #333; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }
        
        /* Mesa sutil en la esquina superior derecha */
        .mesa-tag { 
            position: absolute; top: 20px; right: 20px; 
            color: #222; font-size: 0.7rem; font-family: sans-serif;
            font-weight: bold;
        }

        .logo { width: 220px; height: auto; margin-bottom: 20px; display: block; }
        
        .loader { border: 4px solid #222; border-top: 4px solid var(--v); border-radius: 50%; width: 40px; height: 40px; animation: s 1s linear infinite; margin: 20px auto; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #ok { display: none; width: 100%; animation: entrada 0.5s ease-out; }
        @keyframes entrada { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .check { font-size: 5rem; color: var(--v); margin-bottom: 10px; transition: all 0.5s; }
        
        /* Estilo para cuando la sesión está activa (Bloqueo) */
        .bloqueado .check { color: var(--gris); transform: scale(0.8); }
        .bloqueado #t { color: var(--gris); }
        
        .footer { 
            color: #444; 
            font-size: 0.8rem; 
            margin: 25px auto 0 auto; 
            padding-top: 15px; 
            border-top: 1px solid #111; 
            width: 80%; 
            font-family: sans-serif; 
            text-align: center; 
        }
        strong { color: var(--v); }
    </style>
</head>
<body>
    <div class="mesa-tag" id="display-mesa">REF: --</div>
    <img src="central-blanco.png" alt="Central Wings" class="logo">
    
    <div id="load">
        <div class="loader"></div>
        <p style="font-family: sans-serif; color: #888; font-weight: bold; margin-top: 15px;">SOLICITANDO ATENCIÓN...</p>
    </div>

    <div id="ok">
        <div class="check" id="icono-check">✓</div>
        <h2 id="t" style="margin:0; letter-spacing: -1px; font-size: 2.2rem;">¡RECIBIDO!</h2>
        <p id="c" style="color:#bbb; font-family: sans-serif; font-weight: bold; margin-top: 10px;">Representante en camino. 🍻</p>
        
        <div class="footer" id="footer-texto">
            ¿MÁS ALITAS? ¿OTRA BEBIDA? ¿YA TE VAS?<br>
            <strong>VUELVE A ESCANEAR EL SENSOR DE TU MESA.</strong> <br><br>
            <p style="font-size: 0.7rem; opacity: 0.5;">Seguridad anti-spam activa: 4min</p>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('m') || "1";
        const t_nfc = p.get('t') || ""; // Capturamos el tiempo de la etiqueta NFC PRO
        
        document.getElementById('display-mesa').innerText = "REF: " + m;

        // --- BLOQUEO DE HISTORIAL (ANTI-ATRÁS PARA IPHONE/ANDROID) ---
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };

        const mostrar = (esBloqueo) => { 
            document.getElementById('load').style.display='none'; 
            document.getElementById('ok').style.display='block';
            
            if(esBloqueo) {
                document.body.classList.add('bloqueado');
                document.getElementById('t').innerText = "SOLICITUD ACTIVA";
                document.getElementById('c').innerText = "Ya tenemos tu llamado. ¡Relájate! 🍻";
                document.getElementById('icono-check').innerText = "⌛";
                document.getElementById('footer-texto').style.opacity = "0.3";
            }
        };

        const ahora = Date.now();
        const tiempoBloqueo = 4 * 60 * 1000; 
        const ultimaAlerta = localStorage.getItem("u_alt_" + m);
        const esRecargaPestana = sessionStorage.getItem("a_" + m);

        // 1. Verificación de sesión o tiempo
        if (esRecargaPestana || (ultimaAlerta && (ahora - ultimaAlerta < tiempoBloqueo))) {
            mostrar(true);
        } 
        // 2. ¡Llamado válido!
        else {
            const bot = "8746666236:AAHNWL6-BNiYrw7jlf3-iwX_uK7xlosoAvo";
            const cid = "-5149661099";
            const ablyKey = "XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo";

            // Telegram
            const tlg = fetch(`https://api.telegram.org/bot${bot}/sendMessage?chat_id=${cid}&text=${encodeURIComponent('🚨 MESA ' + m + ' - NECESITA ATENCIÓN 🍗')}`);
            
            // Ably con el parámetro 't' para el monitor
            const abl = fetch(`https://rest.ably.io/channels/central-alertas/messages`, {
                method: 'POST',
                headers: { 'Authorization': 'Basic ' + btoa(ablyKey), 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    name: 'aviso', 
                    data: { 
                        mesa: m,
                        t: t_nfc // Mandamos el DATETIME al monitor
                    } 
                })
            });

            Promise.all([tlg, abl]).finally(() => {
                sessionStorage.setItem("a_" + m, "true");
                localStorage.setItem("u_alt_" + m, ahora);
                setTimeout(() => mostrar(false), 200); 
            });
            
            setTimeout(() => { if(document.getElementById('ok').style.display !== 'block') mostrar(false); }, 1500);
        }
    </script>
</body>
</html>
