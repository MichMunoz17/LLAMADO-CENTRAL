<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central W - Servicio</title>
    <style>
        :root { --v: #8cc63f; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Arial Black', sans-serif; 
            text-align: center; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .logo { width: 220px; height: auto; margin-bottom: 20px; display: block; }
        
        .loader { border: 4px solid #222; border-top: 4px solid var(--v); border-radius: 50%; width: 40px; height: 40px; animation: s 1s linear infinite; margin: 20px auto; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #ok { display: none; width: 100%; }
        .check { font-size: 5rem; color: var(--v); margin-bottom: 10px; }
        .m { font-size: 2.5rem; color: var(--v); font-weight: 900; margin: 5px 0; letter-spacing: -1px; }
        
        .footer { 
            color: #555; 
            font-size: 0.8rem; 
            margin: 25px auto 0 auto; 
            padding-top: 15px; 
            border-top: 1px solid #222; 
            width: 80%; 
            font-family: sans-serif; 
            text-align: center; 
        }
        strong { color: var(--v); }
    </style>
</head>
<body>
    <img src="central-blanco.png" alt="Central Wings" class="logo">
    
    <div id="load">
        <div class="loader"></div>
        <p style="font-family: sans-serif; color: #888; font-weight: bold; margin-top: 15px;">SOLICITANDO ATENCIÓN...</p>
    </div>

    <div id="ok">
        <div class="check">✓</div>
        <h2 id="t" style="margin:0; letter-spacing: -1px;">¡RECIBIDO!</h2>
        <p id="info" class="m"></p>
        <p id="c" style="color:#bbb; font-family: sans-serif; font-weight: bold;">Representante en camino. 🍻</p>
        
        <div class="footer">
            ¿Algo más?<br>
            <strong>Vuelve a escanear el sensor de tu mesa.</strong>
        </div>
    </div>

    <script>
        const p = new URLSearchParams(window.location.search);
        const m = p.get('m') || "1";
        
        const mostrar = (esRef) => { 
            document.getElementById('load').style.display='none'; 
            document.getElementById('ok').style.display='block';
            document.getElementById('info').innerText = "MESA " + m;
            if(esRef) {
                document.getElementById('t').innerText = "SOLICITUD ACTIVA";
                document.getElementById('c').innerText = "¡Ya te vimos! Ten paciencia. 🍻";
                document.querySelector('.check').style.color = "#444";
            }
        };

        // --- LÓGICA ANTI-FANTASMA Y ANTI-SPAM ---
        const ahora = Date.now();
        const tiempoBloqueo = 4 * 60 * 1000; // 4 Minutos de espera entre alertas reales
        const ultimaAlerta = localStorage.getItem("u_alt_" + m);
        const esRecargaPestana = sessionStorage.getItem("a_" + m);

        // 1. Si la pestaña ya envió alerta antes (Reload/Historial), no enviamos nada
        if (esRecargaPestana) {
            mostrar(true);
        } 
        // 2. Si es un escaneo nuevo pero fue hace menos de 4 minutos, bloqueamos spam
        else if (ultimaAlerta && (ahora - ultimaAlerta < tiempoBloqueo)) {
            mostrar(true);
        } 
        // 3. ¡ES UN LLAMADO VÁLIDO!
        else {
            const bot = "8746666236:AAHNWL6-BNiYrw7jlf3-iwX_uK7xlosoAvo";
            const cid = "-5149661099";
            const ablyKey = "XJJPqg.cEnMSg:8AUneJrZlHq_Q8rHAflH-bkPz0T0ECmFt_ZLh9PT9lo";

            const tlg = fetch(`https://api.telegram.org/bot${bot}/sendMessage?chat_id=${cid}&text=${encodeURIComponent('🚨 MESA ' + m + ' - NECESITA ATENCIÓN 🍗')}`);
            
            const abl = fetch(`https://rest.ably.io/channels/central-alertas/messages`, {
                method: 'POST',
                headers: { 'Authorization': 'Basic ' + btoa(ablyKey), 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: 'aviso', data: { mesa: m } })
            });

            Promise.any([tlg, abl]).finally(() => {
                // Guardamos marcas para evitar que el historial o el refresh nos troleen
                sessionStorage.setItem("a_" + m, "true");
                localStorage.setItem("u_alt_" + m, ahora);
                setTimeout(() => mostrar(false), 200); 
            });
            
            // Seguridad en caso de que el internet esté lento
            setTimeout(() => { if(document.getElementById('ok').style.display !== 'block') mostrar(false); }, 1500);
        }
    </script>
</body>
</html>
